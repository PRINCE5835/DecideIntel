services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: decision-backend
    ports:
      - "8080:8080"
    environment:
      - FLASK_DEBUG=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: node:20-alpine
    container_name: decision-frontend
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      - VITE_API_PROXY=http://backend:8080
    volumes:
      - ../decision-ui:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
