name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JWT_SECRET: ci-test-secret-for-github-actions-32bytes
  CORS_ORIGINS: http://localhost:5173
  AUTH_PASSWORD: ci-test-password
  PYTHONPATH: .

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decision-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: decision-ui/package-lock.json
      - run: npm ci
      - run: npm run build

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install black ruff
      - run: ruff check backend/
      - run: black --check backend/
